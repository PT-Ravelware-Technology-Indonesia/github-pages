name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

# Only allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build
        env:
          # basePath so assets resolve correctly under org.github.io/github-pages
          NEXT_PUBLIC_BASE_PATH: /github-pages
          # Token to fetch private repos at build time (stored as a repo Secret)
          # Only used server-side during build; never embedded in the static bundle
          NEXT_PUBLIC_GITHUB_TOKEN: ${{ secrets.PORTAL_GITHUB_TOKEN }}

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          # Keep the gh-pages branch clean on each deploy
          force_orphan: true

